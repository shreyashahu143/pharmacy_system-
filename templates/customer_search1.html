<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Search Sales</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr/dist/flatpickr.min.css">
    <script src="https://cdn.jsdelivr.net/npm/flatpickr"></script>
    <style>
        body { font-family: 'Inter', sans-serif; }
        input:focus {
            outline: 2px solid transparent; outline-offset: 2px;
            border-color: #2563eb;
            box-shadow: 0 0 0 2px rgba(37, 99, 235, 0.5);
        }
    </style>
</head>
<body class="bg-gray-100 p-4 sm:p-8">

    <div class="max-w-5xl mx-auto">
        <h1 class="text-3xl font-bold text-center text-blue-700 mb-8">Search Sales History</h1>

        <div class="bg-white p-6 rounded-2xl shadow-lg mb-8">
            <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
                <div>
                    <label for="search-name" class="block text-sm font-medium text-gray-700 mb-1">Customer Name</label>
                    <input type="text" id="search-name" placeholder="Enter customer name..." class="w-full p-2 border border-gray-300 rounded-md shadow-sm">
                </div>
                
                <div>
                    <label for="search-date" class="block text-sm font-medium text-gray-700 mb-1">Sale Date</label>
                    <input type="text" id="search-date" name="sales_date" class="datepicker w-full p-2 border border-gray-300 rounded-md shadow-sm" placeholder="Select a date...">
                </div>
                
                <div class="flex items-end">
                    <button id="search-btn" class="w-full bg-blue-600 text-white font-bold py-2 px-8 rounded-lg shadow-md hover:bg-blue-700 transition-all duration-150">
                        Search
                    </button>
                </div>
            </div>
        </div>

        <h2 class="text-2xl font-semibold text-gray-700 mb-4">Results</h2>
        <div id="results-container" class="space-y-4">
            <p id="results-message" class="p-6 text-center text-gray-500 bg-white rounded-2xl shadow-lg">Please enter search criteria above.</p>
        </div>
    </div>

<script>
    document.addEventListener('DOMContentLoaded', () => {
        // --- DOM ELEMENTS ---
        const searchBtn = document.getElementById('search-btn');
        const searchName = document.getElementById('search-name');
        const searchDate = document.getElementById('search-date');
        const resultsContainer = document.getElementById('results-container');
        const resultsMessage = document.getElementById('results-message');

        // Initialize Datepicker
        flatpickr(".datepicker", {
            dateFormat: "Y-m-d",
            allowInput: true
        });

        // --- SEARCH FUNCTION ---
        async function handleSearch() {
            const name = searchName.value.trim();
            const date = searchDate.value.trim();

            if (!name && !date) {
                alert("Please enter a name or date to search.");
                return;
            }

            // Show loading message
            resultsContainer.innerHTML = '';
            resultsMessage.textContent = 'Searching...';
            resultsContainer.appendChild(resultsMessage);

            // Build query string
            const params = new URLSearchParams();
            if (name) params.append('name', name);
            if (date) params.append('date', date);

            try {
                // --- FETCH FROM THE NEW ENDPOINT ---
                const response = await fetch(`http://127.0.0.1:5000/api/search/sales?${params.toString()}`);
                if (!response.ok) {
                    const err = await response.json();
                    throw new Error(err.message || 'Server error');
                }

                const allSubmittedBills = await response.json();
                
                // --- RENDER RESULTS ---
                resultsContainer.innerHTML = ''; // Clear "Searching..."
                
                if (allSubmittedBills.length === 0) {
                    resultsMessage.textContent = 'No bills found matching your criteria.';
                    resultsContainer.appendChild(resultsMessage);
                } else {
                    // This logic is copied from your sales bill modal
                    allSubmittedBills.forEach((bill, index) => {
                        const billCard = document.createElement('div');
                        billCard.className = 'p-6 border rounded-2xl bg-white shadow-lg'; // Made padding larger

                        let itemsTableHtml = `
                            <table class="w-full mt-2 text-sm rounded-lg overflow-hidden border border-gray-200">
                                <thead class="bg-gray-100">
                                    <tr>
                                        <th class="p-2 text-left font-medium text-gray-600">Medicine</th>
                                        <th class="p-2 text-center font-medium text-gray-600">Qty</th>
                                        <th class="p-2 text-right font-medium text-gray-600">Unit Price</th>
                                        <th class="p-2 text-right font-medium text-gray-600">Total</th>
                                    </tr>
                                </thead>
                                <tbody>
                        `;
                        
                        bill.billItems.forEach(item => {
                            itemsTableHtml += `
                                <tr class="border-b border-gray-100">
                                    <td class="p-2 text-left">${item.medicine_name}</td>
                                    <td class="p-2 text-center">${item.quantity}</td>
                                    <td class="p-2 text-right">$${parseFloat(item.unit_price).toFixed(2)}</td>
                                    <td class="p-2 text-right font-medium">$${parseFloat(item.item_total).toFixed(2)}</td>
                                </tr>
                            `;
                        });
                        
                        itemsTableHtml += `</tbody></table>`;
                        // ****** THIS IS THE FULLY CORRECTED DISPLAY ******
                        billCard.innerHTML = `
                            <div class="flex flex-col sm:flex-row justify-between sm:items-center pb-3 border-b border-gray-200">
                                <h4 class="font-semibold text-xl text-blue-700">Bill #${bill.billHeader.bill_number}</h4>
                                <span class="text-sm font-medium text-gray-600 mt-1 sm:mt-0">Date: ${bill.billHeader.sales_date}</span>
                            </div>

                            <div class="grid grid-cols-1 md:grid-cols-3 gap-y-4 gap-x-6 text-sm mt-4">
                                <div class="space-y-2">
                                    <h5 class="text-xs font-bold text-gray-500 uppercase">Customer</h5>
                                    <p><strong>Name:</strong> ${bill.billHeader.customer_name}</p>
                                    <p><strong>Phone:</strong> ${bill.billHeader.phone_number}</p>
                                    <p><strong>Type:</strong> ${bill.billHeader.customer_type}</p> 
                                    <p><strong>Doctor:</strong> ${bill.billHeader.doctor_name || 'N/A'}</p>
                                    <p><strong>Address:</strong> ${bill.billHeader.address || 'N/A'}</p>
                                </div>
                                
                                <div class="space-y-2">
                                    <h5 class="text-xs font-bold text-gray-500 uppercase">Payment</h5>
                                    <p><strong>Mode:</strong> ${bill.billPayment.payment_mode}</p>
                                    <p><strong>Amount Paid:</strong> <span class="font-medium text-green-700">$${parseFloat(bill.billPayment.amount_paid).toFixed(2)}</span></p>
                                    <p><strong>Balance:</strong> <span class="font-medium text-red-600">$${parseFloat(bill.billPayment.balance_amount).toFixed(2)}</span></p>
                                    <p><strong>Status:</strong> ${bill.billPayment.payment_status}</p>
                                </div>

                                <div class="space-y-2">
                                    <h5 class="text-xs font-bold text-gray-500 uppercase">Summary</h5>
                                    <p><strong>Total Items:</strong> ${bill.billItems.length}</p>
                                    <p><strong>Total Qty:</strong> ${bill.billSummary.total_quantity}</p>
                                    <p><strong>Bill Total:</strong> <span class="font-bold text-xl text-blue-700">$${parseFloat(bill.billSummary.total_amount).toFixed(2)}</span></p>
                                </div>
                            </div>

                            <details class="mt-4">
                                <summary class="text-sm text-blue-600 cursor-pointer hover:underline font-medium">View Item Details</summary>
                                ${itemsTableHtml}
                            </details>
                        `;
                        resultsContainer.appendChild(billCard);
                    });
                }

            } catch (error) {
                console.error("Error searching sales:", error);
                resultsMessage.textContent = `Error: ${error.message}`;
                resultsContainer.appendChild(resultsMessage);
            }
        }

        // Attach listener
        searchBtn.addEventListener('click', handleSearch);
    });
</script>
</body>
</html>
