<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Product Inventory Master Entry</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                    },
                },
            }
        }
    </script>
    <style>
        .table-container {
            max-height: 70vh;
            overflow-y: auto;
        }
        .table-container thead {
            position: sticky;
            top: 0;
            z-index: 10;
        }
        input:focus, select:focus {
            outline: 2px solid transparent;
            outline-offset: 2px;
            border-color: #2563eb;
            box-shadow: 0 0 0 2px rgba(37, 99, 235, 0.5);
        }
    </style>
</head>
<body class="bg-gray-50 font-sans p-4 md:p-8">

    <div class="container mx-auto p-4 md:p-8">
        <h1 class="text-3xl font-bold text-center text-blue-700 border-b-4 border-blue-500 pb-2 mb-8 rounded">PRODUCT MASTER</h1>
        
        <div class="flex flex-col lg:flex-row gap-8">
            
            <!-- Input Form -->
            <div id="inputForm" class="lg:w-1/2 w-full">
                <h2 class="text-xl font-semibold mb-4 text-gray-700">Add New Product Details</h2>
                <div id="inputTable" class="bg-white rounded-xl shadow-lg">
                    
                    <!-- Item ID is removed, as it's auto-generated -->

                    <div class="flex border-b border-gray-200">
                        <label for="masterProductName" class="w-1/3 p-4 font-semibold bg-gray-50 text-gray-700 border-r border-gray-200 rounded-tl-xl">Product Name</label>
                        <input type="text" id="masterProductName" placeholder="Enter product name" class="w-2/3 p-4 focus:outline-none rounded-tr-xl">
                    </div>
                    
                    <div class="flex border-b border-gray-200">
                        <label for="masterCategory" class="w-1/3 p-4 font-semibold bg-gray-50 text-gray-700 border-r border-gray-200">Category</label>
                        <select id="masterCategory" class="w-2/3 p-4 bg-white focus:outline-none">
                            <option value="">-- Select Category --</option>
                            <!-- Categories will be loaded by JavaScript -->
                        </select>
                    </div>
                    
                    <div class="flex border-b border-gray-200">
                        <label for="masterDescription" class="w-1/3 p-4 font-semibold bg-gray-50 text-gray-700 border-r border-gray-200">Description</label>
                        <input type="text" id="masterDescription" placeholder="Brief description of the product" class="w-2/3 p-4 focus:outline-none">
                    </div>
                    
                    <div class="flex border-b border-gray-200">
                        <label for="masterBasePrice" class="w-1/3 p-4 font-semibold bg-gray-50 text-gray-700 border-r border-gray-200">Base Price (Sale Price)</label>
                        <input type="number" step="0.01" id="masterBasePrice" placeholder="Selling price (e.g., 10.50)" class="w-2/3 p-4 focus:outline-none">
                    </div>

                    <div class="flex border-b border-gray-200">
                        <label for="masterPurchasePrice" class="w-1/3 p-4 font-semibold bg-gray-50 text-gray-700 border-r border-gray-200">Purchase Price</label>
                        <input type="number" step="0.01" id="masterPurchasePrice" placeholder="This is now handled in 'Stock Entry'" class="w-2/3 p-4 focus:outline-none bg-gray-100" readonly>
                    </div>
                    
                    <!-- ****** THIS IS THE FIX ****** -->
                    <div class="flex border-b border-gray-200">
                        <label for="masterGST" class="w-1/3 p-4 font-semibold bg-gray-50 text-gray-700 border-r border-gray-200">GST (%)</label>
                        <input type="number" step="0.1" id="masterGST" placeholder="e.g., 18" class="w-2/3 p-4 focus:outline-none">
                    </div>
                    
                    <div class="flex border-b border-gray-200">
                        <label for="masterReorderLevel" class="w-1/3 p-4 font-semibold bg-gray-50 text-gray-700 border-r border-gray-200">Reorder Level</label>
                        <input type="number" id="masterReorderLevel" placeholder="Minimum stock quantity" class="w-2/3 p-4 focus:outline-none">
                    </div>
                    
                    <div class="flex">
                        <label for="masterManufacturer" class="w-1/3 p-4 font-semibold bg-gray-50 text-gray-700 border-r border-gray-200 rounded-bl-xl">Manufacturer</label>
                        <input type="text" id="masterManufacturer" placeholder="Manufacturer name" class="w-2/3 p-4 focus:outline-none rounded-br-xl">
                    </div>
                </div>

                <!-- Action Buttons -->
                <div class="mt-6">
                    <div id="success-message" class="hidden opacity-0 bg-green-100 border border-green-400 text-green-700 px-4 py-3 rounded-lg mb-4 text-left transition-opacity">
                        <strong class="font-bold">Success!</strong>
                        <span id="success-message-text" class="block sm:inline">Product saved.</span>
                    </div>
                    <div class="flex flex-col sm:flex-row justify-end sm:space-x-4 space-y-4 sm:space-y-0">
                        <button type="button" id="manage-categories-btn" class="bg-indigo-600 text-white font-bold py-3 px-8 rounded-xl shadow-md hover:bg-indigo-700 transition duration-200">
                            Manage Categories
                        </button>
                        <button type="button" id="refresh-list-btn" class="bg-gray-600 text-white font-bold py-3 px-8 rounded-xl shadow-md hover:bg-gray-700 transition duration-200">
                            Refresh List
                        </button>
                        <button type="button" id="saveInventoryButton" class="bg-blue-600 hover:bg-blue-700 text-white font-bold py-3 px-8 rounded-xl transition duration-200 shadow-md">
                            SUBMIT
                        </button>
                    </div>
                </div>
            </div>

            <!-- Display Table -->
            <div id="displayTable" class="lg:w-1/2 w-full">
                <h2 class="text-xl font-semibold mb-4 text-gray-700">Live Product List (from Database)</h2>
                <div class="table-container bg-white rounded-xl shadow-lg overflow-x-auto">
                    <table class="min-w-full divide-y divide-gray-200">
                        <thead class="bg-blue-50">
                            <tr>
                                <th class="px-3 py-3 text-left text-xs font-medium text-gray-600 uppercase tracking-wider whitespace-nowrap">Item ID</th>
                                <th class="px-3 py-3 text-left text-xs font-medium text-gray-600 uppercase tracking-wider whitespace-nowrap">Product Name</th>
                                <th class="px-3 py-3 text-left text-xs font-medium text-gray-600 uppercase tracking-wider whitespace-nowrap">Category</th>
                                <th class="px-3 py-3 text-left text-xs font-medium text-gray-600 uppercase tracking-wider whitespace-nowrap">Base Price</th>
                                <th class="px-3 py-3 text-left text-xs font-medium text-gray-600 uppercase tracking-wider whitespace-nowrap">Avg. Purchase Price</th>
                                <th class="px-3 py-3 text-left text-xs font-medium text-gray-600 uppercase tracking-wider whitespace-nowrap">GST (%)</th>
                                <th class="px-3 py-3 text-left text-xs font-medium text-gray-600 uppercase tracking-wider whitespace-nowrap">Reorder Level</th>
                                <th class="px-3 py-3 text-left text-xs font-medium text-gray-600 uppercase tracking-wider whitespace-nowrap">Manufacturer</th>
                            </tr>
                        </thead>
                        <tbody id="productListBody" class="bg-white divide-y divide-gray-100">
                        </tbody>
                    </table>
                    <div id="emptyMessage" class="p-6 text-center text-gray-500">No products submitted yet.</div>
                </div>
            </div>
        </div>
        
        <!-- Custom Modal (for success/error alerts) -->
        <div id="customModal" class="hidden fixed inset-0 bg-gray-600 bg-opacity-50 overflow-y-auto h-full w-full z-50">
            <div class="relative top-20 mx-auto p-5 border w-96 shadow-lg rounded-md bg-white">
                <div class="mt-3 text-center">
                    <h3 id="modalTitle" class="text-lg leading-6 font-medium text-gray-900">Status</h3>
                    <div class="mt-2 px-7 py-3">
                        <p id="modalMessage" class="text-sm text-gray-500"></p>
                    </div>
                    <div class="items-center px-4 py-3">
                        <button id="modalClose" class="px-4 py-2 bg-blue-500 text-white text-base font-medium rounded-md w-full shadow-sm hover:bg-blue-600 focus:outline-none focus:ring-2 focus:ring-blue-500">Close</button>
                    </div>
                </div>
            </div>
        </div>

        <!-- Category Modal -->
        <div id="category-modal" class="hidden fixed inset-0 bg-gray-600 bg-opacity-75 overflow-y-auto h-full w-full z-50">
            <div class="relative top-20 mx-auto p-6 border w-full max-w-md shadow-lg rounded-md bg-white">
                <h3 class="text-xl font-semibold text-gray-900">Manage Product Categories</h3>
                
                <div class="mt-4">
                    <label for="new-category-name" class="block text-sm font-medium text-gray-700">New Category Name</label>
                    <div class="flex gap-2 mt-1">
                        <input type="text" id="new-category-name" placeholder="e.g., Vitamins" class="flex-1 p-2 border border-gray-300 rounded-md shadow-sm focus:outline-none">
                        <button id="add-category-btn" class="px-5 py-2 bg-blue-600 text-white font-semibold rounded-md shadow-sm hover:bg-blue-700 transition">Add</button>
                    </div>
                    <div id="category-modal-message" class="text-sm mt-2 h-4"></div> <!-- Message area -->
                </div>
                
                <hr class="my-5">
                
                <h4 class="font-semibold text-gray-800">Existing Categories</h4>
                <div id="existing-categories-list" class="mt-2 max-h-40 overflow-y-auto border rounded bg-gray-50 p-3 space-y-1">
                    <p class="text-gray-400">Loading...</p>
                </div>
                
                <div class="mt-6 text-right">
                    <button id="category-modal-close" class="px-6 py-2 bg-gray-600 text-white font-semibold rounded-md shadow-sm hover:bg-gray-700 transition">Close</button>
                </div>
            </div>
        </div>

    </div>

    <script>
        // --- GLOBAL VARS ---
        let productInventory = []; // Local cache for rendering

        // --- DOM ELEMENTS ---
        const saveButton = document.getElementById('saveInventoryButton');
        const modal = document.getElementById('customModal');
        const modalMessage = document.getElementById('modalMessage');
        const modalClose = document.getElementById('modalClose');
        const categorySelect = document.getElementById('masterCategory');
        const productListBody = document.getElementById('productListBody');
        const emptyMessage = document.getElementById('emptyMessage');
        
        const refreshButton = document.getElementById('refresh-list-btn');
        const manageCategoriesBtn = document.getElementById('manage-categories-btn');
        const categoryModal = document.getElementById('category-modal');
        const categoryModalClose = document.getElementById('category-modal-close');
        const addCategoryBtn = document.getElementById('add-category-btn');
        const newCategoryNameInput = document.getElementById('new-category-name');
        const existingCategoriesList = document.getElementById('existing-categories-list');
        const categoryModalMessage = document.getElementById('category-modal-message');

        
        // --- MODAL/ALERT ---
        function customAlert(message) {
            modalMessage.innerText = message;
            modal.classList.remove('hidden');
        }
        modalClose.onclick = () => modal.classList.add('hidden');

        // --- FORMATTING ---
        const formatCurrency = (value) => {
            const num = parseFloat(value);
            return isNaN(num) || num === null ? 'N/A' : `$${num.toFixed(2)}`;
        };
        
        // --- RENDER FUNCTION ---
        function renderProductList() {
            productListBody.innerHTML = ''; 

            if (productInventory.length === 0) {
                emptyMessage.classList.remove('hidden');
                emptyMessage.textContent = 'No products found in database.';
                return;
            }

            emptyMessage.classList.add('hidden');
            
            productInventory.forEach(product => {
                const row = productListBody.insertRow();
                row.className = 'hover:bg-blue-50 transition duration-150';

                row.insertCell().innerHTML = `<div class="px-3 py-3 whitespace-nowrap text-sm font-medium text-gray-900">${product.product_id}</div>`;
                row.insertCell().innerHTML = `<div class="px-3 py-3 whitespace-nowrap text-sm text-gray-700">${product.product_name}</div>`;
                row.insertCell().innerHTML = `<div class="px-3 py-3 whitespace-nowrap text-sm text-gray-700">${product.category_name || 'N/A'}</div>`;
                row.insertCell().innerHTML = `<div class="px-3 py-3 whitespace-nowrap text-sm font-semibold text-green-600">${formatCurrency(product.base_price)}</div>`;
                
                // Show "N/A" for purchase price, as requested
                row.insertCell().innerHTML = `<div class="px-3 py-3 whitespace-nowrap text-sm text-gray-700">N/A</div>`;
                
                row.insertCell().innerHTML = `<div class="px-3 py-3 whitespace-nowrap text-sm text-gray-700">${product.gst ? product.gst + '%' : '0%'}</div>`;
                row.insertCell().innerHTML = `<div class="px-3 py-3 whitespace-nowrap text-sm text-gray-700">${product.reorder_level || '0'}</div>`;
                row.insertCell().innerHTML = `<div class="px-3 py-3 whitespace-nowrap text-sm text-gray-700">${product.manufacturer || 'N/A'}</div>`;
            });
        }

        // --- SAVE PRODUCT (uses FETCH) ---
        async function handleInventorySave(e) {
            e.preventDefault(); 
            
            // Read all fields from the form
            const productName = document.getElementById('masterProductName').value.trim();
            const category = document.getElementById('masterCategory').value;
            const basePriceInput = document.getElementById('masterBasePrice').value.trim();
            const description = document.getElementById('masterDescription').value.trim();
            const gstInput = document.getElementById('masterGST').value.trim();
            const reorderLevelInput = document.getElementById('masterReorderLevel').value.trim();
            const manufacturer = document.getElementById('masterManufacturer').value.trim();

            if (!productName || !category || !basePriceInput || isNaN(parseFloat(basePriceInput))) {
                customAlert("Validation Error: Please enter valid values for Product Name, Category, and Base Price.");
                return;
            }

            const newProduct = {
                productName,
                category,
                basePrice: parseFloat(basePriceInput),
                description,
                purchasePrice: null, // This is handled in stock, so we send null
                gst: gstInput ? parseFloat(gstInput) : null,
                reorderLevel: reorderLevelInput ? parseInt(reorderLevelInput) : 0,
                manufacturer: manufacturer || 'Unknown',
            };
            
            try {
                const response = await fetch('http://127.0.0.1:5000/api/products', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(newProduct)
                });

                const result = await response.json();
                if (!response.ok) throw new Error(result.message || 'Server error');
                
                customAlert(`✅ ${result.message}`);
                
                // Clear the form
                document.getElementById('masterProductName').value = '';
                document.getElementById('masterCategory').value = '';
                document.getElementById('masterDescription').value = '';
                document.getElementById('masterBasePrice').value = '';
                document.getElementById('masterPurchasePrice').value = ''; // This is read-only but good to clear
                document.getElementById('masterGST').value = '';
                document.getElementById('masterReorderLevel').value = '';
                document.getElementById('masterManufacturer').value = '';

                await loadProducts(); // Automatically refresh the list

            } catch (error) {
                console.error("Error saving product:", error);
                customAlert(`Error: Could not save product. ${error.message}`);
            }
        }
        
        // --- LOAD CATEGORIES (uses FETCH) ---
        async function loadCategories() {
            try {
                const response = await fetch('http://127.0.0.1:5000/api/categories');
                if (!response.ok) throw new Error('Could not fetch categories');
                
                const categories = await response.json();
                
                categorySelect.options.length = 1; 
                existingCategoriesList.innerHTML = '';

                if (categories.length === 0) {
                    existingCategoriesList.innerHTML = '<p class="text-gray-400">No categories added yet.</p>';
                }
                
                categories.forEach(cat => {
                    const option = new Option(cat.category_name, cat.category_name);
                    categorySelect.add(option);
                    
                    const li = document.createElement('li');
                    li.textContent = cat.category_name;
                    li.className = 'text-sm text-gray-700';
                    existingCategoriesList.appendChild(li);
                });
            } catch (error) {
                console.error("Error loading categories:", error);
                existingCategoriesList.innerHTML = '<p class="text-red-500">Error loading categories.</p>';
            }
        }
        
        // --- LOAD PRODUCTS (uses FETCH) ---
        async function loadProducts() {
            productListBody.innerHTML = '';
            emptyMessage.classList.remove('hidden');
            emptyMessage.textContent = 'Loading products from database...';
            
            try {
                const response = await fetch('http://127.0.0.1:5000/api/products');
                if (!response.ok) throw new Error('Could not fetch product list');
                
                productInventory = await response.json();
                emptyMessage.textContent = 'No products submitted yet.'; // Reset message
                renderProductList(); // Re-render the table with the new data
                
            } catch (error) {
                console.error("Error loading products:", error);
                customAlert("Error: Could not load product list from database.");
                emptyMessage.textContent = 'Error loading products.';
            }
        }

        // --- HANDLE CATEGORY MODAL ---
        async function handleAddCategory() {
            const newName = newCategoryNameInput.value.trim();
            if (!newName) {
                categoryModalMessage.textContent = 'Please enter a name.';
                categoryModalMessage.className = 'text-sm text-red-600';
                return;
            }

            categoryModalMessage.textContent = 'Adding...';
            categoryModalMessage.className = 'text-sm text-gray-500';

            try {
                const response = await fetch('http://127.0.0.1:5000/api/categories', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ category_name: newName })
                });
                const result = await response.json();
                
                if (!response.ok) throw new Error(result.message);

                categoryModalMessage.textContent = result.message;
                categoryModalMessage.className = 'text-sm text-green-600';
                newCategoryNameInput.value = '';
                
                await loadCategories(); // Refresh both category lists

            } catch (error) {
                categoryModalMessage.textContent = `Error: ${error.message}`;
                categoryModalMessage.className = 'text-sm text-red-600';
            }
        }

        // --- INITIALIZATION ---
        document.addEventListener('DOMContentLoaded', async () => {
            // --- THIS IS THE FIX ---
            // Listen for a 'click' on the button
            saveButton.addEventListener('click', handleInventorySave); 
            
            refreshButton.addEventListener('click', loadProducts);
            
            // Category modal listeners
            manageCategoriesBtn.addEventListener('click', () => {
                categoryModalMessage.textContent = ''; 
                categoryModal.classList.remove('hidden');
                loadCategories(); 
            });
            categoryModalClose.addEventListener('click', () => {
                categoryModal.classList.add('hidden');
            });
            addCategoryBtn.addEventListener('click', handleAddCategory);
            
            // Load all data from our backend when the page opens
            await loadCategories();
            await loadProducts();
        });
    </script>
</body>
</html>
